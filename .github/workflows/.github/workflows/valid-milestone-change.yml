name: Check for Unexpected Milestone Change

on:
  issues:
    types: [milestoned]

permissions:
  issues: read
 
jobs:
  notify-on-milestone-change:
    # This 'if' condition is the filter that makes it run only ONCE per milestone change.
    if: |
      github.event.action == 'milestoned' ||
      github.event.action == 'demilestoned' ||
      (github.event.action == 'edited' && github.event.changes.milestone)

    permissions:
      organization: read

    runs-on: ubuntu-latest
    steps:
    - name: Check Team Membership
      id: check_team
      # This is CRITICAL. If the user is NOT on the team, the API
      # call fails (404), which fails the step. We want the workflow
      # to continue so the 'if' condition below works.
      continue-on-error: true
      env:
        # The GITHUB_TOKEN is automatically used by 'gh' for auth
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh api --silent \
          /orgs/rancher/teams/ui/memberships/${{ github.event.sender.login }}
    - name: "Send Slack message if user is not a team member"
      # This step only runs if the 'is_member' output from the previous step is 'false'.
      if: steps.check_team.conclusion == 'success'
      uses: slackapi/slack-github-action@v1.26.0
      with:
        payload: |
            {
              "actor": "${{ github.event.sender.login }}",
              "issue_title": "${{ github.event.issue.title }}",
              "issue_url": "${{ github.event.issue.html_url }}",
              "milestone_new": "${{ github.event.issue.milestone.title }}",
              "milestone_old": "${{ github.event.changes.milestone.from.title }}"
            }
      env:
        # Use the new secret you created in Step 2
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WORKFLOW_MILESTONE_CHANGED_URL }}
